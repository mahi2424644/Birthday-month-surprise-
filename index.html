<!DOCTYPE html>
<html>
<head>
<title>Love Surprise</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  color:white;
  background: linear-gradient(135deg,#000,#1a001a,#000);
}

/* 🫀 START */
#startScreen{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

#startBtn{
  font-size:80px;
  cursor:pointer;
  animation:glow 1.2s infinite;
}

@keyframes glow{
  0%{transform:scale(1); text-shadow:0 0 10px red;}
  50%{transform:scale(1.2); text-shadow:0 0 30px pink;}
  100%{transform:scale(1);}
}

/* SCREEN */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* 📸 IMAGE */
#img{
  width:420px;
  height:420px;
  object-fit:cover;
  border-radius:25px;
  border:4px solid gold;
  box-shadow:0 0 40px pink;
}

/* 🌹 ROSE */
#rose{
  font-size:160px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/* 🎥 VIDEO */
#videoScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
}

/* TEXT */
#textArea{
  position:absolute;
  left:5%;
  top:30%;
  width:50%;
  font-size:26px;
  text-shadow:0 0 10px pink;
}

/* VIDEO */
#video{
  position:absolute;
  right:5%;
  top:20%;
  width:320px;
  height:420px;
  border-radius:15px;
}

/* 💋 HEARTS */
.heart{
  position:fixed;
  top:-10px;
  font-size:20px;
  animation:fall 6s linear;
}

@keyframes fall{
  to{
    transform:translateY(100vh) rotate(360deg);
    opacity:0;
  }
}

/* CANVAS FIREWORKS */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}
</style>
</head>

<body>

<!-- 🫀 START -->
<div id="startScreen">
  <div id="startBtn" onclick="start()">🫀</div>
</div>

<!-- 📸 PHOTO -->
<div id="photoScreen" class="screen">
  <img id="img" src="pic1.jpg">
</div>

<!-- 🌹 ROSE -->
<div id="roseScreen" class="screen">
  <div id="rose">🌹</div>
  <button onclick="toVideo()">NEXT</button>
</div>

<!-- 🎥 VIDEO -->
<div id="videoScreen">

  <div id="textArea">
    💖 LOVELY JAZAL 💖<br><br>
    🎉 HAPPY BIRTHDAY MONTH 🎉<br><br>
    ✨ YOU ARE MY EVERYTHING ✨
  </div>

  <video id="video" muted loop>
    <source src="video.mp4">
  </video>

</div>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
  <source src="song.mp3">
</audio>

<script>

let imgs=["pic1.jpg","pic2.jpg","pic3.jpg","pic4.jpg"];
let i=0;
let slide;

/* 💋 HEARTS */
function hearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💋";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(15+Math.random()*30)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },150);
}

/* 📸 SLIDESHOW */
function slideshow(){
  setInterval(()=>{
    i=(i+1)%imgs.length;
    document.getElementById("img").src=imgs[i];
  },2000);
}

/* 💥 HEART FIREWORKS */
function fire(){
  const c=document.createElement("canvas");
  document.body.appendChild(c);
  const ctx=c.getContext("2d");

  c.width=window.innerWidth;
  c.height=window.innerHeight;

  function heart(x,y,s){
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.bezierCurveTo(x,y,x-s,y-s,x-s,y);
    ctx.bezierCurveTo(x-s,y+s,x,y+s,x,y);
    ctx.fill();
  }

  setInterval(()=>{
    ctx.clearRect(0,0,c.width,c.height);
    for(let i=0;i<40;i++){
      heart(Math.random()*c.width,Math.random()*c.height,10);
    }
  },400);
}

/* 🫀 START */
function start(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("photoScreen").style.display="flex";

  document.getElementById("music").play().catch(()=>{});

  hearts();
  slideshow();
  fire();
}

/* 📸 → 🌹 */
document.getElementById("photoScreen").onclick=function(){
  document.getElementById("photoScreen").style.display="none";
  document.getElementById("roseScreen").style.display="flex";
}

/* 🌹 → 🎥 */
function toVideo(){
  document.getElementById("roseScreen").style.display="none";
  document.getElementById("videoScreen").style.display="block";

  document.getElementById("video").play();
}

</script>

</body>
</html>
