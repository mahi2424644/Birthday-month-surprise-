<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* 🎁 START */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:100;
  background:black;
}

#gift{
  font-size:100px;
  cursor:pointer;
  animation:shake 1s infinite;
}

@keyframes shake{
  0%{transform:rotate(-5deg);}
  50%{transform:rotate(5deg);}
  100%{transform:rotate(-5deg);}
}

/* SCREEN */
.screen{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* 🎂 CAKE */
#cake{
  font-size:160px;
  animation:pop 1s infinite alternate;
}

/* 📸 PHOTO BIG FIX */
#img{
  width:400px;
  height:400px;
  object-fit:cover;
  border-radius:25px;
  border:4px solid gold;
  box-shadow:0 0 40px black;
}

/* 💍 RING */
#ring{
  font-size:180px;
}

/* 🎥 VIDEO */
#videoScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
}

#video{
  position:absolute;
  right:0;
  width:50%;
  height:100%;
  object-fit:cover;
}

#textArea{
  position:absolute;
  left:0;
  width:50%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  font-size:26px;
}

/* ❤️ HEARTS */
.heart{
  position:fixed;
  top:-10px;
  color:pink;
  font-size:20px;
  animation:fall 6s linear;
}

@keyframes fall{
  to{transform:translateY(100vh);opacity:0;}
}
</style>
</head>

<body>

<!-- 🫀 GIFT OPEN -->
<div id="startScreen">
  <div id="gift" onclick="openGift()">🫀</div>
</div>

<!-- 🍰 CAKE -->
<div id="cakeScreen" class="screen">
  <div id="cake">🎂🎁🫀</div>
  <button onclick="toPhotos()">Tap</button>
</div>

<!-- 📸 PHOTO -->
<div id="photoScreen" class="screen">
  <img id="img" src="pic1.jpg">
  <button onclick="toLove()">I LOVE YOU ❤️</button>
</div>

<!-- 💋 RING -->
<div id="ringScreen" class="screen">
  <div id="ring">💋✨</div>
  <button onclick="toVideo()">Tap</button>
</div>

<!-- 🎥 VIDEO -->
<div id="videoScreen">
  <div id="textArea">
    👄 LOVELY JAZAL 👄<br>
    🎉 HAPPY BIRTHDAY MONTH MY JAN 🎉<br>
    ✨ YOU ARE MY EVERYTHING ✨
  </div>

  <video id="video" autoplay muted loop>
    <source src="video.mp4">
  </video>
</div>

<!-- 🎵 MUSIC -->
<audio id="song" loop>
  <source src="song.mp3">
</audio>

<script>

/* ❤️ HEART RAIN */
function hearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },200);
}

/* 🎆 HEART FIREWORKS */
function heartFireworks(){
  let canvas = document.createElement("canvas");
  document.body.appendChild(canvas);
  let ctx = canvas.getContext("2d");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  function drawHeart(x,y,size){
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.bezierCurveTo(x-10,y-10,x-20,y+10,x,y+20);
    ctx.bezierCurveTo(x+20,y+10,x+10,y-10,x,y);
    ctx.fill();
  }

  setInterval(()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=0;i<20;i++){
      drawHeart(Math.random()*canvas.width,Math.random()*canvas.height,10);
    }
  },500);
}

/* 🫀 GIFT OPEN */
function openGift(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("song").play();

  document.getElementById("cakeScreen").style.display="flex";
  hearts();
  heartFireworks();
}

/* 🎂 → 📸 */
function toPhotos(){
  document.getElementById("cakeScreen").style.display="none";
  document.getElementById("photoScreen").style.display="flex";
}

/* 📸 → ❤️ */
function toLove(){
  document.getElementById("photoScreen").style.display="none";
  document.getElementById("ringScreen").style.display="flex";
}

/* 🌹 → 🎥 */
function toVideo(){
  document.getElementById("ringScreen").style.display="none";
  document.getElementById("videoScreen").style.display="block";
}

</script>

</body>
</html>
