<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* 🫀 START */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:100;
}

#startBtn{
  padding:25px 50px;
  font-size:28px;
  background:gold;
  border:none;
  border-radius:15px;
  cursor:pointer;
  font-weight:bold;
}

/* SCREEN */
.screen{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* 🎂 CAKE */
#cake{
  font-size:160px;
  animation:pop 1s infinite alternate;
}

@keyframes pop{
  from{transform:scale(0.9);}
  to{transform:scale(1.1);}
}

/* 📸 PHOTO BIG FIX */
#img{
  width:460px;
  height:460px;
  object-fit:cover;
  border-radius:25px;
  border:5px solid gold;
  box-shadow:0 0 50px black;
}

/* 🌹 ROSE */
#rose{
  font-size:180px;
}

/* 🎥 VIDEO SMALL FIX */
#videoScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
}

/* TEXT LEFT SIDE */
#textArea{
  position:absolute;
  left:5%;
  width:55%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  font-size:28px;
  z-index:2;
}

/* VIDEO SMALL RIGHT SIDE */
#video{
  position:absolute;
  right:5%;
  bottom:10%;
  width:35%;
  height:70%;
  object-fit:cover;
  opacity:0.75;
  border-radius:15px;
  box-shadow:0 0 20px black;
  z-index:1;
}

/* ❤️ HEARTS */
.heart{
  position:fixed;
  top:-10px;
  color:pink;
  font-size:20px;
  animation:fall 6s linear;
}

@keyframes fall{
  to{
    transform:translateY(100vh);
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- 🫦 START -->
<div id="startScreen">
  <button id="startBtn" onclick="start()">🫦 OPEN SURPRISE</button>
</div>

<!-- 🎂 CAKE -->
<div id="cakeScreen" class="screen">
  <div id="cake">🎂💖</div>
  <button onclick="toPhotos()">Tap</button>
</div>

<!-- 📸 PHOTO -->
<div id="photoScreen" class="screen">
  <img id="img" src="pic1.jpg">
  <button onclick="toLove()">I LOVE YOU 💖</button>
</div>

<!-- 🌹 ROSE -->
<div id="ringScreen" class="screen">
  <div id="ring">🌹 😘</div>
  <button onclick="toVideo()">Tap</button>
</div>

<!-- 🎥 VIDEO -->
<div id="videoScreen">
  <div id="textArea">
    💖 LOVELY JAZAL 💖<br>
    🎉 HAPPY BIRTHDAY MONTH MY JAN 🎉<br>
    ✨ YOU ARE MY EVERYTHING ✨
  </div>

  <video id="video" muted loop>
    <source src="video.mp4">
  </video>
</div>

<!-- 🎵 MUSIC -->
<audio id="song" loop>
  <source src="song.mp3">
</audio>

<script>

/* ❤️ HEARTS */
function hearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💋";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },250);
}

/* 🎁 START */
function start(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("song").play();
  document.getElementById("cakeScreen").style.display="flex";
  hearts();
}

/* 🎂 → 📸 */
function toPhotos(){
  document.getElementById("cakeScreen").style.display="none";
  document.getElementById("photoScreen").style.display="flex";
}

/* 📸 → 💖 */
function toLove(){
  document.getElementById("photoScreen").style.display="none";
  document.getElementById("ringScreen").style.display="flex";
}

/* 💍 → 🎥 */
function toVideo(){
  document.getElementById("ringScreen").style.display="none";
  document.getElementById("videoScreen").style.display="block";

  document.getElementById("video").play(); // ONLY HERE START
}

</script>

</body>
</html>
