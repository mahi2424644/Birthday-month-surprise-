<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* 🫀 START */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:100;
}

#startBtn{
  font-size:90px;
  cursor:pointer;
}

/* SCREEN */
.screen{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* 📸 IMAGE */
#img{
  width:450px;
  height:450px;
  object-fit:cover;
  border-radius:25px;
  border:5px solid gold;
  box-shadow:0 0 40px black;
}

/* 🌹 ROSE */
#rose{
  font-size:180px;
}

/* 🎥 VIDEO SCREEN */
#videoScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
}

/* 💖 TEXT */
#textArea{
  position:absolute;
  left:5%;
  width:55%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  font-size:28px;
  z-index:2;
  text-shadow:0 0 10px black;
}

/* 🎥 VIDEO SMALL */
#video{
  position:absolute;
  right:5%;
  bottom:10%;
  width:35%;
  height:70%;
  object-fit:cover;
  opacity:0.75;
  border-radius:15px;
  box-shadow:0 0 20px black;
}

/* 💋 HEARTS FALL */
.heart{
  position:fixed;
  top:-10px;
  font-size:20px;
  animation:fall 6s linear;
}

@keyframes fall{
  to{
    transform:translateY(100vh);
    opacity:0;
  }
}

/* FIREWORK CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}
</style>
</head>

<body>

<!-- 🫀 START -->
<div id="startScreen">
  <div id="startBtn" onclick="start()">🫀</div>
</div>

<!-- 📸 PHOTO -->
<div id="photoScreen" class="screen">
  <img id="img" src="pic1.jpg">
</div>

<!-- 🌹 ROSE -->
<div id="roseScreen" class="screen">
  <div id="rose">🌹✨</div>
  <button onclick="toVideo()">Tap</button>
</div>

<!-- 🎥 VIDEO -->
<div id="videoScreen">

  <div id="textArea">
    💖 LOVELY JAZAL 💖<br><br>
    🎉 HAPPY BIRTHDAY MONTH MY JAN 🎉<br><br>
    ✨ YOU ARE MY EVERYTHING ✨
  </div>

  <video id="video" muted loop>
    <source src="video.mp4">
  </video>

</div>

<script>

let images=["pic1.jpg","pic2.jpg","pic3.jpg","pic4.jpg"];
let i=0;

/* 💋 HEARTS */
function hearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💋";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },200);
}

/* 📸 SLIDESHOW */
function slideshow(){
  setInterval(()=>{
    i=(i+1)%images.length;
    document.getElementById("img").src=images[i];
  },2000);
}

/* 💥 HEART FIREWORKS */
function fire(){
  const canvas=document.createElement("canvas");
  document.body.appendChild(canvas);
  const ctx=canvas.getContext("2d");

  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  function drawHeart(x,y,size){
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.bezierCurveTo(x-size,y-size,x-2*size,y+size,x,y+2*size);
    ctx.bezierCurveTo(x+2*size,y+size,x+size,y-size,x,y);
    ctx.fill();
  }

  setInterval(()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<25;i++){
      drawHeart(
        Math.random()*canvas.width,
        Math.random()*canvas.height,
        6+Math.random()*6
      );
    }
  },400);
}

/* 🫀 START */
function start(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("photoScreen").style.display="flex";

  hearts();
  slideshow();
  fire();
}

/* 📸 → 🌹 */
document.getElementById("photoScreen").onclick=function(){
  document.getElementById("photoScreen").style.display="none";
  document.getElementById("roseScreen").style.display="flex";
}

/* 🌹 → 🎥 */
function toVideo(){
  document.getElementById("roseScreen").style.display="none";
  document.getElementById("videoScreen").style.display="block";

  document.getElementById("video").play();
}

</script>

</body>
  </html>
