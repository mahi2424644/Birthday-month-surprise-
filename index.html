<!DOCTYPE html>
<html>
<head>
<title>Love Surprise</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background: radial-gradient(circle,#1a000a,black);
  color:white;
  animation: heartbeat 3s infinite;
}

@keyframes heartbeat{
  0%{filter:brightness(1);}
  50%{filter:brightness(1.3);}
  100%{filter:brightness(1);}
}

/* 🎁 START */
#startScreen{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

#gift{
  font-size:100px;
  cursor:pointer;
  animation:shake 1s infinite;
}

@keyframes shake{
  0%{transform:rotate(-5deg);}
  50%{transform:rotate(5deg);}
  100%{transform:rotate(-5deg);}
}

/* SCREENS */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* 🎂 CAKE */
#cake{
  font-size:160px;
  animation:pop 1s infinite alternate;
}

@keyframes pop{
  from{transform:scale(0.9);}
  to{transform:scale(1.1);}
}

/* 📸 */
#img{
  width:420px;
  height:420px;
  object-fit:cover;
  border-radius:25px;
  border:4px solid gold;
}

/* 💍 */
#ring{
  font-size:180px;
}

/* 💖 NAME */
#nameGlow{
  position:absolute;
  top:10%;
  width:100%;
  text-align:center;
  font-size:60px;
  color:pink;
  text-shadow:0 0 10px red,0 0 30px purple;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{transform:scale(1);}
  to{transform:scale(1.2);}
}

/* 🎥 */
#videoScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
}

#textArea{
  position:absolute;
  left:5%;
  top:25%;
  width:50%;
  font-size:24px;
  z-index:5;
  color:pink;
  text-shadow:0 0 10px hotpink;
}

#video{
  position:absolute;
  right:5%;
  top:20%;
  width:280px;
  height:380px;
  border-radius:15px;
}

/* ❤️ HEARTS */
.heart{
  position:fixed;
  top:-10px;
  font-size:20px;
  animation:fall 6s linear;
}

@keyframes fall{
  to{transform:translateY(100vh);opacity:0;}
}

/* 🌹 PETALS */
.petal{
  position:fixed;
  top:-10px;
  font-size:20px;
  animation:fall 6s linear;
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}
</style>
</head>

<body>

<!-- 🎁 -->
<div id="startScreen">
  <div id="gift" onclick="start()">🎁</div>
</div>

<!-- 🎂 -->
<div id="cakeScreen" class="screen">
  <div id="cake">🎂💖</div>
  <button onclick="toPhotos()">Tap</button>
</div>

<!-- 📸 -->
<div id="photoScreen" class="screen">
  <div id="nameGlow">JAZAL 💖</div>
  <img id="img" src="pic1.jpg">
  <button onclick="toLove()">I LOVE YOU 💖</button>
</div>

<!-- 💍 -->
<div id="ringScreen" class="screen">
  <div id="ring">💍✨</div>
  <button onclick="toVideo()">Tap</button>
</div>

<!-- 🎥 -->
<div id="videoScreen">

  <div id="textArea"></div>

  <video id="video" autoplay muted loop>
    <source src="video.mp4">
  </video>
</div>

<audio id="song" loop>
  <source src="song.mp3">
</audio>

<script>

let imgs=["pic1.jpg","pic2.jpg","pic3.jpg","pic4.jpg"];
let i=0;
let text = [
"💖 LOVELY JAZAL 💖",
"",
"🎉 HAPPY BIRTHDAY MONTH 🎉",
"",
"✨ You are my life ✨",
"💕 My heart belongs to you 💕",
"💍 Forever together 💍"
];
let t=0,c=0;

/* HEARTS */
function hearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },200);
}

/* PETALS */
function petals(){
  setInterval(()=>{
    let p=document.createElement("div");
    p.className="petal";
    p.innerHTML="🌹";
    p.style.left=Math.random()*100+"vw";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),6000);
  },300);
}

/* FIREWORKS */
function fire(){
  const c=document.createElement("canvas");
  document.body.appendChild(c);
  const ctx=c.getContext("2d");
  c.width=window.innerWidth;
  c.height=window.innerHeight;

  function draw(x,y,s){
    ctx.fillStyle="pink";
    ctx.fillRect(x,y,s,s);
  }

  setInterval(()=>{
    ctx.clearRect(0,0,c.width,c.height);
    for(let i=0;i<40;i++){
      draw(Math.random()*c.width,Math.random()*c.height,3);
    }
  },400);
}

/* TYPE TEXT */
function type(){
  if(t>=text.length) return;
  let area=document.getElementById("textArea");
  if(c<text[t].length){
    area.innerHTML+=text[t][c++];
    setTimeout(type,50);
  }else{
    area.innerHTML+="<br>";
    t++;c=0;
    setTimeout(type,300);
  }
}

/* START */
function start(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("cakeScreen").style.display="flex";

  document.getElementById("song").play().catch(()=>{});

  hearts();
  petals();
  fire();
}

/* FLOW */
function toPhotos(){
  document.getElementById("cakeScreen").style.display="none";
  document.getElementById("photoScreen").style.display="flex";

  setInterval(()=>{
    i=(i+1)%imgs.length;
    document.getElementById("img").src=imgs[i];
  },2000);
}

function toLove(){
  document.getElementById("photoScreen").style.display="none";
  document.getElementById("ringScreen").style.display="flex";
}

function toVideo(){
  document.getElementById("ringScreen").style.display="none";
  document.getElementById("videoScreen").style.display="block";

  type();
}

</script>

</body>
</html>
