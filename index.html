<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background: radial-gradient(circle,#1a000a,black);
  color:white;
}

/* START */
#startScreen{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

#gift{
  font-size:100px;
  cursor:pointer;
  animation:shake 1s infinite;
}

@keyframes shake{
  0%{transform:rotate(-5deg);}
  50%{transform:rotate(5deg);}
  100%{transform:rotate(-5deg);}
}

/* SCREEN */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* CAKE */
#cake{
  font-size:160px;
  animation:pop 1s infinite alternate;
}

@keyframes pop{
  from{transform:scale(0.9);}
  to{transform:scale(1.1);}
}

/* IMAGE */
#img{
  width:420px;
  height:420px;
  object-fit:cover;
  border-radius:25px;
  border:4px solid gold;
}

/* RING */
#ring{
  font-size:180px;
}

/* VIDEO */
#videoScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
}

#textArea{
  position:absolute;
  left:5%;
  top:25%;
  width:50%;
  font-size:24px;
  color:pink;
  text-shadow:0 0 10px hotpink;
}

#video{
  position:absolute;
  right:5%;
  top:20%;
  width:280px;
  height:380px;
  border-radius:15px;
}

/* HEARTS */
.heart{
  position:fixed;
  top:-10px;
  font-size:20px;
  animation:fall 6s linear;
}

@keyframes fall{
  to{
    transform:translateY(100vh);
    opacity:0;
  }
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* BUTTON */
button{
  margin-top:20px;
  padding:10px 25px;
  font-size:18px;
  background:gold;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <div id="gift" onclick="start()">🎁</div>
</div>

<!-- CAKE -->
<div id="cakeScreen" class="screen">
  <div id="cake">🎂💖</div>
  <button onclick="toPhotos()">Tap</button>
</div>

<!-- PHOTO -->
<div id="photoScreen" class="screen">
  <img id="img" src="pic1.jpg">
  <button onclick="toLove()">I LOVE YOU 💖</button>
</div>

<!-- RING -->
<div id="ringScreen" class="screen">
  <div id="ring">💍✨</div>
  <button onclick="toVideo()">Tap</button>
</div>

<!-- VIDEO -->
<div id="videoScreen">

  <div id="textArea"></div>

  <video id="video" autoplay muted loop>
    <source src="video.mp4">
  </video>
</div>

<!-- MUSIC -->
<audio id="song" loop>
  <source src="song.mp3">
</audio>

<script>

let imgs=["pic1.jpg","pic2.jpg","pic3.jpg","pic4.jpg"];
let i=0;

let slideInterval;
let t=0,c=0;

let text=[
"💖 LOVELY JAZAL 💖",
"",
"🎉 HAPPY BIRTHDAY MONTH 🎉",
"",
"✨ You are my life ✨",
"💕 My heart belongs to you 💕",
"💍 Forever together 💍"
];

/* HEARTS */
function hearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },200);
}

/* FIREWORKS FIXED */
function fire(){
  const c=document.createElement("canvas");
  document.body.appendChild(c);
  const ctx=c.getContext("2d");

  c.width=window.innerWidth;
  c.height=window.innerHeight;

  let particles=[];

  function spawn(){
    particles.push({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      s:2
    });
  }

  function draw(){
    ctx.clearRect(0,0,c.width,c.height);

    for(let p of particles){
      ctx.fillStyle="hotpink";
      ctx.fillRect(p.x,p.y,p.s,p.s);
    }

    requestAnimationFrame(draw);
  }

  setInterval(spawn,120);
  draw();
}

/* TYPE TEXT FIXED */
function type(){
  if(t>=text.length) return;

  let area=document.getElementById("textArea");

  if(c<text[t].length){
    area.innerHTML+=text[t].charAt(c);
    c++;
    setTimeout(type,50);
  }else{
    area.innerHTML+="<br>";
    t++;
    c=0;
    setTimeout(type,300);
  }
}

/* START */
function start(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("cakeScreen").style.display="flex";

  document.getElementById("song").play().catch(()=>{});

  hearts();
  fire();
}

/* CAKE → PHOTO */
function toPhotos(){
  document.getElementById("cakeScreen").style.display="none";
  document.getElementById("photoScreen").style.display="flex";

  let img=document.getElementById("img");
  img.src=imgs[0];

  clearInterval(slideInterval);

  slideInterval=setInterval(()=>{
    i=(i+1)%imgs.length;
    img.src=imgs[i];
  },2000);
}

/* PHOTO → RING */
function toLove(){
  document.getElementById("photoScreen").style.display="none";
  document.getElementById("ringScreen").style.display="flex";
}

/* RING → VIDEO */
function toVideo(){
  document.getElementById("ringScreen").style.display="none";
  document.getElementById("videoScreen").style.display="block";

  document.getElementById("textArea").innerHTML="";
  t=0;c=0;

  type();
}

</script>

</body>
</html>
