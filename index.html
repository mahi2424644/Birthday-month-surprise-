<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* 🎁 START */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:50;
}

#startBtn{
  padding:25px 50px;
  font-size:28px;
  background:gold;
  border:none;
  border-radius:15px;
  cursor:pointer;
  font-weight:bold;
}

/* 🎂 CAKE */
.screen{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:40;
}

#cake{
  font-size:160px;
  animation:pop 1s infinite alternate;
  filter:drop-shadow(0 0 25px gold);
}

@keyframes pop{
  from{transform:scale(0.9);}
  to{transform:scale(1.1);}
}

/* 📸 PHOTO */
#img{
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:15px;
  border:3px solid gold;
  animation:float 2s infinite alternate;
}

@keyframes float{
  from{transform:translateY(0);}
  to{transform:translateY(-15px);}
}

/* 💍 RING */
#ring{
  font-size:180px;
}

/* 🎥 VIDEO */
#videoScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
}

#video{
  position:absolute;
  right:0;
  width:50%;
  height:100%;
  object-fit:cover;
}

#textArea{
  position:absolute;
  left:0;
  width:50%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  font-size:26px;
  padding:10px;
}

/* ❤️ HEARTS */
.heart{
  position:fixed;
  top:-10px;
  color:pink;
  animation:fall 6s linear;
}

@keyframes fall{
  to{
    transform:translateY(100vh);
    opacity:0;
  }
}
</style>
</head>

<body>

<!-- 🎁 START -->
<div id="startScreen">
  <button id="startBtn" onclick="start()">🎁 OPEN SURPRISE</button>
</div>

<!-- 🎂 CAKE -->
<div id="cakeScreen" class="screen">
  <div id="cake">🎂💖</div>
  <button onclick="toPhotos()">Tap</button>
</div>

<!-- 📸 PHOTO -->
<div id="photoScreen" class="screen">
  <img id="img" src="pic1.jpg">
  <button onclick="toLove()">I LOVE YOU 💖</button>
</div>

<!-- 💍 RING -->
<div id="ringScreen" class="screen">
  <div id="ring">💍✨</div>
  <button onclick="toVideo()">Tap</button>
</div>

<!-- 🎥 VIDEO -->
<div id="videoScreen">
  <div id="textArea">
    💖 LOVELY JAZAL 💖<br>
    🎉 HAPPY BIRTHDAY MONTH MY JAN 🎉<br>
    ✨ YOU ARE MY EVERYTHING ✨
  </div>

  <video id="video" autoplay muted loop>
    <source src="video.mp4">
  </video>
</div>

<!-- 🎵 MUSIC -->
<audio id="song" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<!-- 🎆 FIREWORKS -->
<canvas id="fireworks"></canvas>

<script src="https://cdn.jsdelivr.net/npm/fireworks-js@2.x/dist/index.umd.js"></script>

<script>

/* ❤️ HEARTS */
function hearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },250);
}

/* 🎆 FIREWORKS */
function fireworks(){
  const f=new Fireworks.default(document.body,{
    speed:4,
    particles:100,
    intensity:50
  });
  f.start();
}

/* 🎁 START */
function start(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("song").play();

  document.getElementById("cakeScreen").style.display="flex";
  hearts();
}

/* 🎂 → 📸 */
function toPhotos(){
  document.getElementById("cakeScreen").style.display="none";
  document.getElementById("photoScreen").style.display="flex";
}

/* 📸 → 💖 */
function toLove(){
  document.getElementById("photoScreen").style.display="none";
  document.getElementById("ringScreen").style.display="flex";

  fireworks(); // 💥 ring pe fireworks
}

/* 💍 → 🎥 */
function toVideo(){
  document.getElementById("ringScreen").style.display="none";
  document.getElementById("videoScreen").style.display="block";
}

</script>

</body>
</html>
