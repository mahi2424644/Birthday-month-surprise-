<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

/* ❤️🌹 START */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

#startBtn{
  font-size:80px;
  cursor:pointer;
  animation:beat 1s infinite;
  text-shadow:0 0 20px red;
}

@keyframes beat{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/* SCREEN */
.screen{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* 📸 IMAGE */
#img{
  width:450px;
  height:450px;
  object-fit:cover;
  border-radius:25px;
  border:5px solid gold;
  box-shadow:0 0 40px black;
}

/* 🌹 ROSE */
#rose{
  font-size:160px;
}

/* 🎥 VIDEO */
#videoScreen{
  position:fixed;
  width:100%;
  height:100%;
  display:none;
}

/* 💖 TEXT */
#textArea{
  position:absolute;
  left:5%;
  width:55%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  font-size:28px;
  z-index:2;
}

/* VIDEO SMALL */
#video{
  position:absolute;
  right:5%;
  bottom:10%;
  width:35%;
  height:70%;
  object-fit:cover;
  opacity:0.75;
  border-radius:15px;
}

/* 💋 HEARTS BIG */
.heart{
  position:fixed;
  top:-10px;
  font-size:20px;
  animation:fall 6s linear;
}

@keyframes fall{
  to{
    transform:translateY(100vh);
    opacity:0;
  }
}

/* 🔘 BUTTON */
button{
  font-size:26px;
  padding:14px 30px;
  margin-top:20px;
  border:none;
  border-radius:12px;
  background:gold;
  font-weight:bold;
  cursor:pointer;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<!-- ❤️🌹 START -->
<div id="startScreen">
  <div id="startBtn" onclick="start()">❤️🌹</div>
</div>

<!-- 📸 PHOTO -->
<div id="photoScreen" class="screen">
  <img id="img" src="pic1.jpg">
  <button onclick="toRose()">Tap</button>
</div>

<!-- 🌹 ROSE -->
<div id="roseScreen" class="screen">
  <div id="rose">🌹✨</div>
  <button onclick="toVideo()">Tap</button>
</div>

<!-- 🎥 VIDEO -->
<div id="videoScreen">

  <div id="textArea">
    💖 LOVELY JAZAL 💖<br><br>
    🎉 HAPPY BIRTHDAY MONTH MY JAN 🎉<br><br>
    ✨ YOU ARE MY EVERYTHING ✨
  </div>

  <video id="video" muted loop>
    <source src="video.mp4">
  </video>

</div>

<script>

let imgs=["pic1.jpg","pic2.jpg","pic3.jpg","pic4.jpg"];
let i=0;
let slide;

/* 💋 BIG HEART ANIMATION */
function hearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💋";
    h.style.left=Math.random()*100+"vw";

    // BIG RANDOM SIZE
    h.style.fontSize = (20 + Math.random()*30) + "px";

    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },150);
}

/* 📸 SLIDESHOW */
function start(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("photoScreen").style.display="flex";

  hearts();

  let img=document.getElementById("img");
  img.src=imgs[0];

  slide=setInterval(()=>{
    i++;
    if(i>=imgs.length) i=0;
    img.src=imgs[i];
  },2000);
}

/* 📸 → 🌹 */
function toRose(){
  document.getElementById("photoScreen").style.display="none";
  document.getElementById("roseScreen").style.display="flex";

  clearInterval(slide);
}

/* 🌹 → 🎥 */
function toVideo(){
  document.getElementById("roseScreen").style.display="none";
  document.getElementById("videoScreen").style.display="block";

  document.getElementById("video").play();
}

</script>

</body>
</html>
